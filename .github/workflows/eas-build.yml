name: EAS Build & Submit

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build"
        required: true
        default: "ios"
        type: choice
        options:
          - ios
          - android
          - all
      profile:
        description: "Build profile"
        required: true
        default: "production"
        type: choice
        options:
          - development
          - preview
          - production
      submit:
        description: "Submit to store after build?"
        required: true
        default: "false"
        type: boolean

jobs:
  build-ios:
    name: Build iOS
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
      (github.event_name == 'workflow_dispatch' && (inputs.platform == 'ios' || inputs.platform == 'all'))
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git credentials
        run: |
          git config user.email "ci@blastmycv.com"
          git config user.name "BlastMyCV CI"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/president-afk/blastmycv-mobile.git
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Auto-increment iOS build number
        id: bump
        run: |
          node -e "
            const fs = require('fs');
            const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            const current = parseInt(app.expo.ios.buildNumber || '5', 10);
            const next = current + 1;
            app.expo.ios.buildNumber = String(next);
            fs.writeFileSync('app.json', JSON.stringify(app, null, 2) + '\n');
            console.log('BUILD_NUMBER=' + next);
          " | tee /tmp/build_num.txt
          echo "build_number=$(cat /tmp/build_num.txt | grep BUILD_NUMBER | cut -d= -f2)" >> $GITHUB_OUTPUT

      - name: Commit and push incremented build number
        run: |
          git add app.json
          git commit -m "ci: bump iOS buildNumber to ${{ steps.bump.outputs.build_number }} [skip ci]" || echo "Nothing to commit"
          git push origin HEAD:main

      - name: Write Apple ASC API Key
        env:
          ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
        run: |
          mkdir -p /tmp/asc-keys
          node -e "
            const fs = require('fs');
            let key = process.env.ASC_API_KEY_CONTENT || '';
            if (!key.includes('-----BEGIN')) {
              key = '-----BEGIN PRIVATE KEY-----\n' + key.trim() + '\n-----END PRIVATE KEY-----\n';
            }
            fs.writeFileSync('/tmp/asc-keys/asc-key.p8', key);
            console.log('Key written, length:', key.length, 'has headers:', key.includes('BEGIN'));
          "

      - name: Build iOS (+ auto-submit to TestFlight if requested)
        env:
          ASC_API_KEY_PATH: /tmp/asc-keys/asc-key.p8
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          EXPO_PUBLIC_API_BASE_URL: https://blastmycv.com
        run: |
          PROFILE="${{ github.event.inputs.profile || 'production' }}"
          SHOULD_SUBMIT="${{ github.event.inputs.submit || 'false' }}"
          if [ "$SHOULD_SUBMIT" = "true" ]; then
            eas build --platform ios --profile $PROFILE --non-interactive --auto-submit
          else
            eas build --platform ios --profile $PROFILE --non-interactive --no-wait
          fi

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
      (github.event_name == 'workflow_dispatch' && (inputs.platform == 'android' || inputs.platform == 'all'))
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android
        env:
          EXPO_PUBLIC_API_BASE_URL: https://blastmycv.com
        run: |
          PROFILE="${{ github.event.inputs.profile || 'production' }}"
          eas build --platform android --profile $PROFILE --non-interactive --no-wait
