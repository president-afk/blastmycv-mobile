name: EAS Build & Submit

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build"
        required: true
        default: "ios"
        type: choice
        options:
          - ios
          - android
          - all
      profile:
        description: "Build profile"
        required: true
        default: "production"
        type: choice
        options:
          - development
          - preview
          - production
      submit:
        description: "Submit to store after build?"
        required: true
        default: "false"
        type: boolean

jobs:
  build-ios:
    name: Build iOS
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
      (github.event_name == 'workflow_dispatch' && (inputs.platform == 'ios' || inputs.platform == 'all'))
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Write Apple ASC API Key
        env:
          ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
        run: |
          mkdir -p /tmp/asc-keys
          printf '%s' "$ASC_API_KEY_CONTENT" > /tmp/asc-keys/asc-key.p8

      - name: Build iOS
        env:
          ASC_API_KEY_PATH: /tmp/asc-keys/asc-key.p8
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          EXPO_PUBLIC_API_BASE_URL: https://blastmycv.com
        run: |
          PROFILE="${{ github.event.inputs.profile || 'production' }}"
          eas build --platform ios --profile $PROFILE --non-interactive --no-wait

      - name: Submit iOS to TestFlight
        if: ${{ github.event.inputs.submit == 'true' }}
        env:
          ASC_API_KEY_PATH: /tmp/asc-keys/asc-key.p8
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          EXPO_PUBLIC_API_BASE_URL: https://blastmycv.com
        run: |
          PROFILE="${{ github.event.inputs.profile || 'production' }}"
          eas submit --platform ios --profile $PROFILE --latest --non-interactive

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
      (github.event_name == 'workflow_dispatch' && (inputs.platform == 'android' || inputs.platform == 'all'))
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android
        env:
          EXPO_PUBLIC_API_BASE_URL: https://blastmycv.com
        run: |
          PROFILE="${{ github.event.inputs.profile || 'production' }}"
          eas build --platform android --profile $PROFILE --non-interactive --no-wait
