name: EAS Build & Submit

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build"
        required: true
        default: "ios"
        type: choice
        options:
          - ios
          - android
          - all
      profile:
        description: "Build profile"
        required: true
        default: "production"
        type: choice
        options:
          - development
          - preview
          - production
      submit:
        description: "Submit to store after build?"
        required: true
        default: "false"
        type: boolean

jobs:
  build-ios:
    name: Build iOS
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
      (github.event_name == 'workflow_dispatch' && (inputs.platform == 'ios' || inputs.platform == 'all'))
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Auto-increment iOS build number via GitHub API
        id: bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Read current app.json and increment buildNumber
          CURRENT=$(node -e "const a=require('./app.json');console.log(a.expo.ios.buildNumber||'5')")
          NEXT=$((CURRENT + 1))
          echo "Current: $CURRENT → Next: $NEXT"

          # Write new app.json locally
          node -e "
            const fs=require('fs');
            const a=JSON.parse(fs.readFileSync('app.json','utf8'));
            a.expo.ios.buildNumber=String($NEXT);
            fs.writeFileSync('app.json',JSON.stringify(a,null,2)+'\n');
          "

          # Update app.json via GitHub API (works without git push permission)
          FILE_SHA=$(curl -sf -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/contents/app.json" \
            | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8');console.log(JSON.parse(d).sha)")

          CONTENT_B64=$(base64 -w0 app.json)

          curl -sf -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${{ github.repository }}/contents/app.json" \
            -d "{\"message\":\"ci: bump iOS buildNumber to $NEXT [skip ci]\",\"content\":\"$CONTENT_B64\",\"sha\":\"$FILE_SHA\",\"branch\":\"main\"}" \
            | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8');const r=JSON.parse(d);console.log(r.commit?'✅ Pushed buildNumber='+$NEXT:'❌ '+JSON.stringify(r))"

          echo "build_number=$NEXT" >> $GITHUB_OUTPUT

      - name: Write Apple ASC API Key
        env:
          ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
        run: |
          mkdir -p /tmp/asc-keys
          node -e "
            const fs = require('fs');
            let key = process.env.ASC_API_KEY_CONTENT || '';
            if (!key.includes('-----BEGIN')) {
              key = '-----BEGIN PRIVATE KEY-----\n' + key.trim() + '\n-----END PRIVATE KEY-----\n';
            }
            fs.writeFileSync('/tmp/asc-keys/asc-key.p8', key);
            console.log('Key written, length:', key.length, 'has headers:', key.includes('BEGIN'));
          "

      - name: Build iOS (+ auto-submit to TestFlight if requested)
        env:
          ASC_API_KEY_PATH: /tmp/asc-keys/asc-key.p8
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          EXPO_PUBLIC_API_BASE_URL: https://blastmycv.com
        run: |
          PROFILE="${{ github.event.inputs.profile || 'production' }}"
          SHOULD_SUBMIT="${{ github.event.inputs.submit || 'false' }}"
          if [ "$SHOULD_SUBMIT" = "true" ]; then
            eas build --platform ios --profile $PROFILE --non-interactive --auto-submit
          else
            eas build --platform ios --profile $PROFILE --non-interactive --no-wait
          fi

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
      (github.event_name == 'workflow_dispatch' && (inputs.platform == 'android' || inputs.platform == 'all'))
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android
        env:
          EXPO_PUBLIC_API_BASE_URL: https://blastmycv.com
        run: |
          PROFILE="${{ github.event.inputs.profile || 'production' }}"
          eas build --platform android --profile $PROFILE --non-interactive --no-wait
